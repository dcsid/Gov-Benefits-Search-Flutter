name: benefits_digger
description: Flutter Web rewrite of the Benefits Digger frontend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  dio: ^5.7.0
  dio_smart_retry: ^7.0.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.4
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.4
  go_router: ^14.6.1
  http: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  # `assets/images/` and `assets/icons/` are not declared here â they are
  # currently empty (`.gitkeep` only). Re-add them when real assets land;
  # leaving them in caused the empty dirs' `.gitkeep` files to ship in
  # `build/web/assets/assets/{images,icons}/`.
  # Inter is bundled locally instead of fetched at runtime via google_fonts;
  # this removes the first-paint network round-trip and the font-swap flash
  # on initial load.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
